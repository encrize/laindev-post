name: Service bot (on-demand commands)

# Опрос сервисного бота для ручных команд (/post, /batch, /status).
on:
  schedule:
    - cron: "*/30 * * * *"   # каждые 30 минут проверяем команды
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-state
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Poll commands
        env:
          CHANNEL_BOT_TOKEN: ${{ secrets.CHANNEL_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SERVICE_BOT_TOKEN: ${{ secrets.SERVICE_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main bot
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: bot state [skip ci]"
            git pull --rebase --autostash
            git push
          fi
