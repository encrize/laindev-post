name: Publish (1 post per slot)

# Публикация по одному посту из очереди — 6 слотов в день (= 6 постов).
on:
  schedule:
    # Часы по МСК: 08, 12, 14, 16, 20, 01  ->  UTC: 05, 09, 11, 13, 17, 22
    - cron: "0 5,9,11,13,17,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-state
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Publish one
        env:
          CHANNEL_BOT_TOKEN: ${{ secrets.CHANNEL_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SERVICE_BOT_TOKEN: ${{ secrets.SERVICE_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main publish
      - name: Commit state
        run: 'bash scripts/commit_state.sh "chore: publish post [skip ci]"'
