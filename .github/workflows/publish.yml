name: Publish (1 post per slot)

# Публикация по одному посту из очереди — 5 слотов в день (= 5 постов).
on:
  schedule:
    - cron: "0 6,9,12,15,18 * * *"   # 5 слотов (UTC), равномерно по дню
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-state
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Publish one
        env:
          CHANNEL_BOT_TOKEN: ${{ secrets.CHANNEL_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SERVICE_BOT_TOKEN: ${{ secrets.SERVICE_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main publish
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish post [skip ci]"
            git pull --rebase --autostash
            git push
          fi
