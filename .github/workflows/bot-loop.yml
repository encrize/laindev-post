name: Service bot (always-on loop)

# Непрерывный режим сервисного бота: long-polling ~5ч 40м, потом сам себя перезапускает.
# Работает только на ПУБЛИЧНОМ репо (безлимитные минуты Actions).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # страховка: если цепочка перезапусков прервётся — поднимет снова

permissions:
  contents: write
  actions: write          # нужно, чтобы воркфлоу мог перезапустить сам себя

concurrency:
  group: bot-loop          # ОТДЕЛЬНАЯ группа — не блокирует Curate/Publish
  cancel-in-progress: false

jobs:
  bot-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 355    # запас под лимит 6 часов
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run bot loop
        env:
          LOOP_MINUTES: "340"
          CHANNEL_BOT_TOKEN: ${{ secrets.CHANNEL_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SERVICE_BOT_TOKEN: ${{ secrets.SERVICE_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main bot_loop
      - name: Commit state (safety net)
        if: always()
        run: |
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: bot state [skip ci]"
            git pull --rebase --autostash
            git push
          fi
      - name: Re-launch loop
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bot-loop.yml
